  no_tracer_logic: Tracer section does not connect patient flow from ED intake through
    psychiatric stabilization and discharge planning.
  weak_staff_section: Staff readiness omits competence in suicide precautions, contraband
    search, or de-escalation escalation pathways.
mcp_uncertainty_points:
- fact: Whether any current CMS or accreditor guidance updates affect suicide risk
