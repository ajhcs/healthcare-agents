  survey_window: Synthetic window of 2026-05-20 through 2026-06-30
  focus_areas:
  - Suicide risk reassessment documentation on inpatient psychiatric unit
  - Environmental ligature risk mitigation
  - Medication reconciliation at admission from emergency department
