intentionally_unknown:
- Viral sequencing comparison across all infant specimens
- Exact visitor symptom screening failure count
- Whether one borderline early-onset case should be classified community onset or
  healthcare associated
red_flags:
  nicu_specificity_missing: Generic adult-unit outbreak language would miss cohorting,
    parental presence, and respiratory support workflow issues central to NICU control.
  weak_case_definition: Report should make the temporal and location linkage credible
    even if the formal case definition text is concise.
  premature_resolution: Outbreak should not be closed before the surveillance interval
    and enhanced controls are documented.
mcp_uncertainty_points:
- fact: Any current CMS or federal guidance changes relevant to respiratory virus
    infection control expectations in hospitals
  capability_class: current_regulatory_policy
  action: Check for current CMS or comparable policy updates if the report will be
    reused for live policy alignment beyond the quarterly refresh window.
