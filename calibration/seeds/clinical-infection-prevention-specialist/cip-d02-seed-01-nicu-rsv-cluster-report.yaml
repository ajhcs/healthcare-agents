complexity: high
required_facts:
  facility_name: Alder Crest Children's Hospital
  organism_condition: Respiratory syncytial virus cluster in NICU
  investigation_start: 2026-01-07
  investigation_end: 2026-02-04
  lead_investigator: Naomi Fen, CIC
  trigger_date: 2026-01-07
  detection_method: Clinical report and lab confirmation
  baseline_rate: 0 NICU RSV cases in prior 12 months
  current_rate: 5 NICU cases in 9 days
  total_cases: '5'
  attack_rate: '13.9'
  epidemic_period: 2026-01-05 to 2026-01-14
  units_affected: Level III NICU pods B and C
  suspected_mode: Droplet and contact
  common_exposures: shared respiratory therapy team, sibling visitation during winter
